<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROBUSTE — Order Management</title>
<style>
  :root{--ink:#1a1a1a;--muted:#777;--line:#e6e6e6;--bg:#f6f7f9;}
  *{box-sizing:border-box;}body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);margin:0;}
  .wrap{max-width:880px;margin:30px auto;padding:0 20px;}
  h1{font-size:22px;margin:0 0 2px;} .sub{color:var(--muted);font-size:13px;margin:0 0 18px;}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
  .toolbar button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;}
  .toolbar button.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
  .order{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
  .ohead{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .oid{font-weight:700;} .ometa{color:var(--muted);font-size:13px;}
  .badge{font-size:12px;font-weight:700;border-radius:999px;padding:4px 12px;border:1px solid;}
  .amber{background:#fff7e6;color:#9a6700;border-color:#ffe3a3;}
  .blue{background:#e8f0ff;color:#1d4ed8;border-color:#bdd2ff;}
  .purple{background:#f1ecff;color:#6b46c1;border-color:#dccbff;}
  .teal{background:#e3f7f5;color:#0c7a72;border-color:#b6ece7;}
  .green{background:#e8f7ec;color:#0a7d33;border-color:#bce8c8;}
  .red{background:#fdeaea;color:#b00020;border-color:#f6c5c5;}
  .orange{background:#fff0e6;color:#b25b00;border-color:#ffd2b0;}
  .gray{background:#eee;color:#555;border-color:#ddd;}
  .controls{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap;}
  select,.go{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;}
  .go{background:#1a1a1a;color:#fff;border:0;cursor:pointer;} .go:disabled{background:#bbb;cursor:not-allowed;}
  .timeline{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px;font-size:12.5px;color:#444;}
  .timeline .t{display:flex;gap:8px;margin:3px 0;} .timeline .dot{width:8px;height:8px;border-radius:50%;background:#1a1a1a;margin-top:5px;flex:0 0 auto;}
  .notif{margin-top:10px;background:#f0f7ff;border:1px solid #cfe3ff;border-radius:10px;padding:10px 12px;font-size:12.5px;}
  .notif b{display:block;} .legacy{font-size:11px;color:#b25b00;background:#fff3e6;border-radius:6px;padding:2px 7px;margin-left:6px;}
  code{background:#f0f0f3;padding:1px 5px;border-radius:4px;font-size:12px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Order management</h1>
  <p class="sub">Status is a neutral <b>key</b> in the data; labels are translated at display time. Switch language — the data never changes.</p>
  <div class="toolbar">
    <span class="ometa">Language:</span>
    <button data-loc="en" class="on">English</button>
    <button data-loc="fr">Français</button>
    <button data-loc="ar">العربية</button>
  </div>
  <div id="list"></div>
</div>

<script src="orders.js"></script>
<script>
let LOCALE = "en";
const notifLog = {}; // orderId -> last notification

// One order arrives straight from legacy Firestore with an Arabic status string.
const raw = [
  { id: "ORD-1007", email: "a@example.com", total: 61.43, _legacy: "جديد" },
  { id: "ORD-1006", email: "b@example.com", total: 129.99, status: "paid" },
  { id: "ORD-1005", email: "c@example.com", total: 86.50, status: "shipped", tracking: "RB-US-1005" },
  { id: "ORD-1004", email: "d@example.com", total: 219.00, status: "delivered" }
];
// Migrate legacy -> neutral keys on load (the un-breaking step).
const orders = raw.map(o => {
  const status = o.status || Orders.normalizeLegacyStatus(o._legacy);
  return Object.assign({}, o, { status, history: [{ status, at: new Date().toISOString(), by: "import" }] });
});

function badge(status){ return `<span class="badge ${Orders.color(status)}">${Orders.label(status, LOCALE)}</span>`; }

function render(){
  document.documentElement.lang = LOCALE; document.documentElement.dir = LOCALE === "ar" ? "rtl" : "ltr";
  const list = document.getElementById("list"); list.innerHTML = "";
  orders.forEach((o, i) => {
    const next = Orders.nextStatuses(o.status);
    const opts = next.map(s => `<option value="${s}">${Orders.label(s, LOCALE)}</option>`).join("");
    const tl = (o.history||[]).map(h => `<div class="t"><span class="dot"></span><span>${badge(h.status)} <span class="ometa">${new Date(h.at).toLocaleString()}</span></span></div>`).join("");
    const n = notifLog[o.id];
    const notif = n ? `<div class="notif"><b>✉ Email to ${n.to}</b>${n.subject} — ${n.body}</div>` : "";
    const legacyTag = o._legacy ? `<span class="legacy">migrated from “${o._legacy}”</span>` : "";
    const el = document.createElement("div"); el.className = "order";
    el.innerHTML = `
      <div class="ohead">
        <div><span class="oid">${o.id}</span> <span class="ometa">· ${o.email} · $${o.total.toFixed(2)}</span>${legacyTag}</div>
        <div>${badge(o.status)}</div>
      </div>
      <div class="controls">
        ${next.length ? `<select id="sel-${i}">${opts}</select><button class="go" data-i="${i}">Advance status</button>`
                       : `<span class="ometa">Final state — no further transitions.</span>`}
      </div>
      <div class="timeline">${tl}</div>
      ${notif}`;
    list.appendChild(el);
  });
  document.querySelectorAll(".go").forEach(b => b.addEventListener("click", () => {
    const i = +b.dataset.i; const to = document.getElementById("sel-"+i).value;
    const res = Orders.transition(orders[i], to, { by: "admin", deps: { notifier: (nf) => { notifLog[orders[i].id] = nf; } } });
    if (!res.ok) alert(res.error);
    render();
  }));
}
document.querySelectorAll("[data-loc]").forEach(b => b.addEventListener("click", () => {
  LOCALE = b.dataset.loc;
  document.querySelectorAll("[data-loc]").forEach(x => x.classList.toggle("on", x === b));
  render();
}));
render();
</script>
</body>
</html>
