<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Orders Admin | ROBUSTE</title>

<!-- Bootstrap RTL + Icons (same CDNs already used by the site) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Firebase (same compat SDK version as the rest of the site) + Auth -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  :root { --brand:#ff6b00; --brand-dark:#e85d00; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --bg:#f5f6f8; }
  * { box-sizing:border-box; }
  body { font-family:'Segoe UI',Tahoma,Arial,sans-serif; background:var(--bg); color:var(--ink); margin:0; }

  #loginGate { position:fixed; inset:0; background:linear-gradient(135deg,#1f2937,#374151); display:flex; align-items:center; justify-content:center; z-index:2000; }
  #loginGate .card { width:min(92vw,400px); border:none; border-radius:18px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
  #loginGate .brand-dot { width:54px;height:54px;border-radius:14px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.6rem; }

  .navbar-admin { background:#fff; border-bottom:1px solid var(--line); }
  .navbar-admin .logo { font-weight:800; color:var(--brand); letter-spacing:.5px; }

  .stat-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px 20px; height:100%; transition:transform .15s ease, box-shadow .15s ease; }
  .stat-card:hover { transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,.06); }
  .stat-card .label { color:var(--muted); font-size:.85rem; font-weight:600; }
  .stat-card .value { font-size:1.7rem; font-weight:800; margin-top:4px; }
  .stat-icon { width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem; }

  .chart-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px 20px; height:100%; }
  .chart-card h6 { font-weight:800; }
  .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .bar-row:last-child { margin-bottom:0; }
  .bar-label { width:84px; font-size:.8rem; color:var(--muted); flex-shrink:0; }
  .bar-track { flex-grow:1; background:#f1f2f4; border-radius:8px; height:22px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:8px; min-width:2px; transition:width .45s ease; }
  .bar-val { font-size:.8rem; font-weight:700; width:30px; text-align:left; flex-shrink:0; }
  .daybars { display:flex; align-items:flex-end; gap:4px; height:150px; }
  .daybar { flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; height:100%; }
  .daybar .col { width:100%; background:var(--brand); border-radius:4px 4px 0 0; min-height:2px; transition:height .45s ease; }
  .daybar .d-label { font-size:.6rem; color:var(--muted); margin-top:5px; }
  .chart-empty { color:var(--muted); font-size:.85rem; text-align:center; padding:30px 0; }

  .toolbar { background:#fff; border:1px solid var(--line); border-radius:16px; padding:14px 16px; }

  .table-wrap { background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  table.orders { width:100%; border-collapse:collapse; }
  table.orders th { background:#fafbfc; font-size:.82rem; color:var(--muted); text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); white-space:nowrap; }
  table.orders td { padding:12px 14px; border-bottom:1px solid #f1f2f4; font-size:.9rem; vertical-align:middle; }
  table.orders tr:last-child td { border-bottom:none; }
  table.orders tbody tr { cursor:pointer; transition:background .12s ease; }
  table.orders tbody tr:hover { background:#fff8f2; }
  table.orders tbody tr.archived-row { background:#fafafa; opacity:.7; }
  table.orders tbody tr.archived-row:hover { background:#f3f4f6; }
  .order-id { font-family:monospace; font-size:.8rem; color:var(--muted); }
  .arch-tag { font-size:.65rem; background:#e5e7eb; color:#6b7280; padding:.15em .5em; border-radius:6px; margin-right:4px; }

  .badge-status { font-size:.78rem; font-weight:700; padding:.4em .7em; border-radius:999px; white-space:nowrap; }
  .s-new { background:#e0f2fe; color:#0369a1; }
  .s-confirmed { background:#ede9fe; color:#6d28d9; }
  .s-preparing { background:#fef3c7; color:#b45309; }
  .s-delivered { background:#dcfce7; color:#15803d; }
  .s-cancelled { background:#fee2e2; color:#b91c1c; }

  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state i { font-size:3rem; opacity:.4; }

  .prod-line { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f1f2f4; }
  .prod-line img { width:46px;height:46px;object-fit:cover;border-radius:8px;background:#f1f2f4; }
  .prod-line:last-child { border-bottom:none; }

  .info-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dashed #eef0f2; font-size:.92rem; }
  .info-row:last-child { border-bottom:none; }
  .info-row .k { color:var(--muted); }
  .info-row .v { font-weight:700; }

  .btn-brand { background:var(--brand); border-color:var(--brand); color:#fff; }
  .btn-brand:hover { background:var(--brand-dark); border-color:var(--brand-dark); color:#fff; }

  .spin-wrap { padding:60px; text-align:center; color:var(--muted); }
</style>
</head>
<body>

<!-- ===================== LOGIN GATE (Firebase Auth) ===================== -->
<div id="loginGate">
  <div class="card p-4">
    <div class="d-flex align-items-center gap-3 mb-3">
      <div class="brand-dot"><i class="bi bi-shield-lock"></i></div>
      <div>
        <div class="fw-bold" style="font-size:1.1rem;">Admin sign-in</div>
        <div class="text-muted" style="font-size:.85rem;">ROBUSTE · Orders Management</div>
      </div>
    </div>
    <label class="form-label fw-semibold">Email</label>
    <input type="email" id="adminEmail" class="form-control form-control-lg mb-2" dir="ltr" placeholder="admin@example.com" autocomplete="username">
    <label class="form-label fw-semibold">Password</label>
    <input type="password" id="adminPass" class="form-control form-control-lg" placeholder="••••••••" autocomplete="current-password">
    <div id="loginError" class="text-danger mt-2" style="font-size:.85rem; display:none;"></div>
    <button id="loginBtn" class="btn btn-brand btn-lg w-100 mt-3"><i class="bi bi-box-arrow-in-left"></i> Sign in</button>
    <p class="text-muted mt-3 mb-0" style="font-size:.72rem; line-height:1.5;">Verified via Firebase Authentication. Only authorized accounts can view orders.</p>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app" style="display:none;">

  <nav class="navbar navbar-admin py-3">
    <div class="container-xl d-flex justify-content-between align-items-center">
      <span class="logo fs-5"><i class="bi bi-box-seam"></i> ROBUSTE · Orders Dashboard</span>
      <div class="d-flex gap-2 align-items-center">
        <span id="adminWho" class="text-muted d-none d-md-inline" style="font-size:.82rem;" dir="ltr"></span>
        <button id="refreshBtn" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Sign out</button>
      </div>
    </div>
  </nav>

  <div class="container-xl py-4">

    <div class="row g-3 mb-4" id="statsRow">
      <div class="col-6 col-lg-3">
        <div class="stat-card d-flex align-items-center gap-3">
          <div class="stat-icon" style="background:#eef2ff;color:#4338ca;"><i class="bi bi-receipt"></i></div>
          <div><div class="label">Total orders</div><div class="value" id="statTotal">—</div></div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card d-flex align-items-center gap-3">
          <div class="stat-icon" style="background:#e0f2fe;color:#0369a1;"><i class="bi bi-bell"></i></div>
          <div><div class="label">Pending orders</div><div class="value" id="statNew">—</div></div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card d-flex align-items-center gap-3">
          <div class="stat-icon" style="background:#dcfce7;color:#15803d;"><i class="bi bi-check2-circle"></i></div>
          <div><div class="label">Delivered</div><div class="value" id="statDelivered">—</div></div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card d-flex align-items-center gap-3">
          <div class="stat-icon" style="background:#fff7ed;color:#c2410c;"><i class="bi bi-cash-coin"></i></div>
          <div><div class="label">Total revenue</div><div class="value" id="statRevenue">—</div></div>
        </div>
      </div>
    </div>

    <!-- ===== Charts (pure SVG/CSS, no external libraries) ===== -->
    <div class="row g-3 mb-4">
      <div class="col-12 col-lg-6">
        <div class="chart-card">
          <h6 class="mb-3"><i class="bi bi-bar-chart-line"></i> Orders by status</h6>
          <div id="chartStatus"></div>
        </div>
      </div>
      <div class="col-12 col-lg-6">
        <div class="chart-card">
          <h6 class="mb-3"><i class="bi bi-graph-up"></i> Orders (last 12 months)</h6>
          <div class="daybars" id="chartDays"></div>
        </div>
      </div>
    </div>

    <div class="toolbar mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-12 col-lg-4">
          <label class="form-label mb-1" style="font-size:.82rem;"><i class="bi bi-search"></i> Search (name / phone / order #)</label>
          <input type="text" id="searchInput" class="form-control" placeholder="Search…">
        </div>
        <div class="col-6 col-lg-2">
          <label class="form-label mb-1" style="font-size:.82rem;">Status</label>
          <select id="statusFilter" class="form-select">
            <option value="">All</option>
          </select>
        </div>
        <div class="col-6 col-lg-2">
          <label class="form-label mb-1" style="font-size:.82rem;">From date</label>
          <input type="date" id="dateFrom" class="form-control">
        </div>
        <div class="col-6 col-lg-2">
          <label class="form-label mb-1" style="font-size:.82rem;">To date</label>
          <input type="date" id="dateTo" class="form-control">
        </div>
        <div class="col-6 col-lg-2">
          <button id="clearFilters" class="btn btn-outline-secondary w-100"><i class="bi bi-x-circle"></i> Clear</button>
        </div>
      </div>
      <div class="form-check form-switch mt-3 mb-0">
        <input class="form-check-input" type="checkbox" id="showArchived">
        <label class="form-check-label" for="showArchived" style="font-size:.85rem;">Show archived orders</label>
      </div>
    </div>

    <div class="table-wrap">
      <div id="tableContent">
        <div class="spin-wrap"><div class="spinner-border text-warning" role="status"></div><div class="mt-2">Loading orders…</div></div>
      </div>
    </div>
    <div id="resultCount" class="text-muted mt-2" style="font-size:.85rem;"></div>

  </div>
</div>

<!-- ===================== ORDER DETAILS MODAL ===================== -->
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content" style="border-radius:16px; border:none;">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-receipt-cutoff"></i> Order details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="firebase-init.js"></script>
<!-- Shared US/Stripe commerce modules (single source of truth) -->
<script src="lib/money.js"></script>
<script src="lib/orders.js"></script>
<script>
(function(){
  'use strict';

  /* =========================================================
     CONFIG — same Firebase project as the storefront.
     Login uses Firebase Authentication (Email/Password).
     ========================================================= */
  // Single source of truth for config lives in firebase-init.js
  var firebaseConfig = window.firebaseConfig || {};

  /* ===== Status model — neutral keys via the shared Orders module ===== */
  var STATUS = Orders.STATUS;
  var STATUS_COLOR = {
    pending: "#0ea5e9", paid: "#3b82f6", processing: "#f59e0b",
    shipped: "#8b5cf6", delivered: "#22c55e", cancelled: "#ef4444", refunded: "#f97316"
  };
  var STATUSES = [
    STATUS.PENDING, STATUS.PAID, STATUS.PROCESSING, STATUS.SHIPPED,
    STATUS.DELIVERED, STATUS.CANCELLED, STATUS.REFUNDED
  ].map(function(k){
    return { key: k, css: "s-" + k, color: STATUS_COLOR[k] || "#64748b", label: Orders.label(k, "en") };
  });
  var DEFAULT_STATUS = STATUS.PENDING;

  function statusMeta(raw){
    var k = Orders.normalizeLegacyStatus(raw);
    for (var i=0;i<STATUSES.length;i++){ if (STATUSES[i].key === k) return STATUSES[i]; }
    return { key: k, css: "s-" + k, color: STATUS_COLOR[k] || "#64748b", label: Orders.label(k, "en") || k };
  }

  /* ===== State ===== */
  var auth = null, db = null;
  var allOrders = [];
  var modalInstance = null;
  var ordersLoaded = false;

  /* ===== Helpers ===== */
  function $(id){ return document.getElementById(id); }
  function esc(v){
    if (v == null) return "";
    return String(v).replace(/[&<>\"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'\"':"&quot;","'":"&#39;"})[c];
    });
  }
  function fmtMoney(n){
    var num = Number(n);
    if (!isFinite(num)) num = 0;
    return Money.format(num, "USD");
  }
  function parseDate(ts){
    if (!ts) return null;
    try {
      if (typeof ts === 'string') { var d = new Date(ts); return isNaN(d.getTime()) ? null : d; }
      if (typeof ts === 'object'){
        if (typeof ts.toDate === 'function') return ts.toDate();
        if (typeof ts.seconds === 'number') return new Date(ts.seconds * 1000);
      }
    } catch(e){}
    return null;
  }
  function fmtDate(d){
    if (!d) return "—";
    try { return d.toLocaleString('en-US', { year:'numeric', month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit' }); }
    catch(e){ return d.toISOString(); }
  }
  function orderDate(data){ return parseDate(data && data.createdAt) || parseDate(data && data.timestamp); }
  function customerName(data){ return data.customer || data.customerName || data.fullName || data.name || "—"; }
  function orderTotal(data){
    if (data.totalPrice != null) return Number(data.totalPrice) || 0;
    if (data.total != null) return Number(data.total) || 0;
    var arr = Array.isArray(data.products) ? data.products : [];
    var t = 0; for (var i=0;i<arr.length;i++){ t += (Number(arr[i].price)||0) * (Number(arr[i].quantity)||0); }
    return t;
  }
  function isArchived(data){ return data && data.archived === true; }
  /* Active = not archived. Stats and charts use active orders only. */
  function activeOrders(){
    var out = [];
    for (var i=0;i<allOrders.length;i++){ if (!isArchived(allOrders[i].data)) out.push(allOrders[i]); }
    return out;
  }
  function maxOf(arr){ var m=0; for (var i=0;i<arr.length;i++){ if (arr[i]>m) m=arr[i]; } return m; }

  /* ===== Firebase init (runs immediately) ===== */
  function initFirebase(){
    if (typeof firebase === 'undefined' || !firebase.initializeApp){
      showLoginError("Couldn't load Firebase. Check your internet connection.");
      return false;
    }
    try {
      if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
      return true;
    } catch(e){
      console.error('Firebase init error', e);
      showLoginError("Firebase initialization error.");
      return false;
    }
  }

  /* ===== Auth ===== */
  function showLoginError(msg){
    var el = $("loginError");
    el.innerHTML = '<i class="bi bi-exclamation-circle"></i> ' + esc(msg);
    el.style.display = 'block';
  }
  function tryLogin(){
    if (!auth) { if (!initFirebase()) return; }
    var email = ($("adminEmail").value || "").trim();
    var pass = $("adminPass").value;
    if (!email || !pass){ showLoginError("Enter your email and password."); return; }
    $("loginError").style.display = 'none';
    var btn = $("loginBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in…';
    auth.signInWithEmailAndPassword(email, pass)
      .catch(function(err){
        console.error('Auth error', err);
        var map = {
          'auth/invalid-email': "Invalid email address.",
          'auth/user-not-found': "No account found for this email.",
          'auth/wrong-password': "Incorrect password.",
          'auth/invalid-credential': "Invalid login credentials.",
          'auth/too-many-requests': "Too many attempts. Try again later."
        };
        showLoginError(map[err && err.code] || "Couldn't sign in. Check your details.");
      })
      .finally(function(){
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-left"></i> Sign in';
      });
  }
  function logout(){ if (auth) auth.signOut(); }

  function onAuth(user){
    if (user){
      $("loginGate").style.display = 'none';
      $("app").style.display = 'block';
      var who = $("adminWho"); if (who) who.textContent = user.email || '';
      if (!ordersLoaded){ buildStatusFilter(); loadOrders(); }
    } else {
      ordersLoaded = false;
      $("app").style.display = 'none';
      $("loginGate").style.display = 'flex';
      var p = $("adminPass"); if (p) p.value = '';
    }
  }

  function buildStatusFilter(){
    var sel = $("statusFilter");
    if (sel.options.length > 1) return; // already built
    STATUSES.forEach(function(s){
      var o = document.createElement('option');
      o.value = s.key; o.textContent = s.label;
      sel.appendChild(o);
    });
  }

  /* ===== Load orders ===== */
  function loadOrders(){
    $("tableContent").innerHTML = '<div class="spin-wrap"><div class="spinner-border text-warning" role="status"></div><div class="mt-2">Loading orders…</div></div>';
    db.collection('orders').get()
      .then(function(snap){
        ordersLoaded = true;
        allOrders = [];
        snap.forEach(function(doc){ allOrders.push({ id: doc.id, data: doc.data() || {} }); });
        allOrders.sort(function(a,b){
          var da = orderDate(a.data), dbb = orderDate(b.data);
          if (da && dbb) return dbb - da;
          if (da) return -1; if (dbb) return 1; return 0;
        });
        renderStats();
        renderCharts();
        applyFilters();
      })
      .catch(function(err){
        console.error('Load error', err);
        var msg = (err && err.code === 'permission-denied')
          ? "You don't have permission for this action. Check that your Firestore rules are published and you're signed in."
          : "Something went wrong. Please try again.";
        showTableError(msg);
      });
  }

  function showTableError(msg){
    $("tableContent").innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><div class="mt-3 fw-semibold">'+esc(msg)+'</div></div>';
    $("resultCount").textContent = "";
  }

  /* ===== Analytics cards (active orders only) ===== */
  function renderStats(){
    var active = activeOrders();
    var total = active.length;
    var nNew = 0, nDelivered = 0, revenue = 0;
    active.forEach(function(o){
      var st = statusMeta(o.data.status).key;
      if (st === STATUS.PENDING) nNew++;
      if (st === STATUS.DELIVERED) nDelivered++;
      if (st !== STATUS.CANCELLED && st !== STATUS.REFUNDED) revenue += orderTotal(o.data);
    });
    $("statTotal").textContent = total.toLocaleString('en-US');
    $("statNew").textContent = nNew.toLocaleString('en-US');
    $("statDelivered").textContent = nDelivered.toLocaleString('en-US');
    $("statRevenue").textContent = fmtMoney(revenue);
  }

  /* ===== Charts (pure SVG/CSS, no libraries) ===== */
  function renderCharts(){
    var active = activeOrders();

    // --- Orders by status (horizontal bars) ---
    var counts = {};
    STATUSES.forEach(function(s){ counts[s.key] = 0; });
    active.forEach(function(o){
      var k = statusMeta(o.data.status).key;
      if (counts[k] == null) counts[k] = 0;
      counts[k]++;
    });
    var countVals = [];
    STATUSES.forEach(function(s){ countVals.push(counts[s.key] || 0); });
    var maxCount = maxOf(countVals); if (maxCount < 1) maxCount = 1;
    if (!active.length){
      $("chartStatus").innerHTML = '<div class="chart-empty">No data yet.</div>';
    } else {
      var bars = STATUSES.map(function(s){
        var c = counts[s.key] || 0;
        var pct = Math.round((c / maxCount) * 100);
        return '<div class="bar-row">'
          + '<span class="bar-label">'+esc(s.label)+'</span>'
          + '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+s.color+';"></div></div>'
          + '<span class="bar-val">'+c.toLocaleString('en-US')+'</span>'
          + '</div>';
      }).join('');
      $("chartStatus").innerHTML = bars;
    }

    // --- Orders over the last 12 months (vertical bars) ---
    var MONTHS_AR = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var months = [];
    var firstOfThisMonth = new Date(); firstOfThisMonth.setDate(1); firstOfThisMonth.setHours(0,0,0,0);
    for (var i=11;i>=0;i--){ var mm = new Date(firstOfThisMonth.getFullYear(), firstOfThisMonth.getMonth()-i, 1); months.push({ y: mm.getFullYear(), m: mm.getMonth(), count: 0 }); }
    active.forEach(function(o){
      var dt = orderDate(o.data); if (!dt) return;
      var oy = dt.getFullYear(), om = dt.getMonth();
      for (var j=0;j<months.length;j++){ if (months[j].y === oy && months[j].m === om){ months[j].count++; break; } }
    });
    var monthVals = months.map(function(d){ return d.count; });
    var maxMonth = maxOf(monthVals); if (maxMonth < 1) maxMonth = 1;
    var hasMonthData = false; for (var k=0;k<monthVals.length;k++){ if (monthVals[k] > 0){ hasMonthData = true; break; } }
    if (!hasMonthData){
      $("chartDays").innerHTML = '<div class="chart-empty" style="width:100%;">No orders in the last 12 months.</div>';
    } else {
      var cols = months.map(function(d){
        var h = Math.round((d.count / maxMonth) * 100);
        var lbl = MONTHS_AR[d.m] + ' ' + d.y;
        return '<div class="daybar" title="'+lbl+' — '+d.count+' orders">'
          + '<div class="col" style="height:'+h+'%;"></div>'
          + '<span class="d-label">'+MONTHS_AR[d.m].slice(0,3)+'</span>'
          + '</div>';
      }).join('');
      $("chartDays").innerHTML = cols;
    }
  }

  /* ===== Filtering + search ===== */
  function applyFilters(){
    var q = ($("searchInput").value || "").trim().toLowerCase();
    var statusF = $("statusFilter").value;
    var fromV = $("dateFrom").value;
    var toV = $("dateTo").value;
    var showArch = $("showArchived").checked;
    var from = fromV ? new Date(fromV + "T00:00:00") : null;
    var to = toV ? new Date(toV + "T23:59:59") : null;

    var base = showArch ? allOrders : activeOrders();

    var rows = base.filter(function(o){
      var d = o.data;
      if (statusF && statusMeta(d.status).key !== statusF) return false;
      var dt = orderDate(d);
      if (from && (!dt || dt < from)) return false;
      if (to && (!dt || dt > to)) return false;
      if (q){
        var hay = (customerName(d) + " " + (d.phone||"") + " " + o.id).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });

    renderTable(rows);
  }

  /* ===== Table render ===== */
  function renderTable(rows){
    if (!rows.length){
      $("tableContent").innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><div class="mt-3">No matching orders.</div></div>';
      $("resultCount").textContent = "0 orders";
      return;
    }
    var html = '<table class="orders"><thead><tr>'
      + '<th>Order #</th><th>Customer</th><th>Phone</th><th>Total</th><th>Date</th><th>Status</th>'
      + '</tr></thead><tbody>';
    rows.forEach(function(o){
      var d = o.data;
      var sm = statusMeta(d.status);
      var arch = isArchived(d);
      html += '<tr data-id="'+esc(o.id)+'" class="'+(arch?'archived-row':'')+'">'
        + '<td><span class="order-id">'+esc(o.id)+'</span>'+(arch?' <span class="arch-tag">Archived</span>':'')+'</td>'
        + '<td>'+esc(customerName(d))+'</td>'
        + '<td dir="ltr" style="text-align:left;">'+esc(d.phone||"—")+'</td>'
        + '<td>'+esc(fmtMoney(orderTotal(d)))+'</td>'
        + '<td>'+esc(fmtDate(orderDate(d)))+'</td>'
        + '<td><span class="badge-status '+sm.css+'" style="background:'+sm.color+';color:#fff;">'+esc(sm.label)+'</span></td>'
        + '</tr>';
    });
    html += '</tbody></table>';
    $("tableContent").innerHTML = html;
    $("resultCount").textContent = rows.length.toLocaleString('en-US') + " orders";

    var trs = $("tableContent").querySelectorAll('tbody tr');
    for (var i=0;i<trs.length;i++){
      trs[i].addEventListener('click', function(){ openOrder(this.getAttribute('data-id')); });
    }
  }

  /* ===== Order details modal ===== */
  function openOrder(id){
    var rec = null;
    for (var i=0;i<allOrders.length;i++){ if (allOrders[i].id === id){ rec = allOrders[i]; break; } }
    if (!rec) return;
    var d = rec.data;
    var sm = statusMeta(d.status);
    var arch = isArchived(d);
    var sh = d.shipping || {};

    var products = Array.isArray(d.products) ? d.products : [];
    var prodHtml = '';
    if (products.length){
      products.forEach(function(p){
        var name = p.name || p.title || "Item";
        var qty = (p.quantity != null) ? p.quantity : 1;
        var price = Number(p.price)||0;
        prodHtml += '<div class="prod-line">'
          + (p.image ? '<img src="'+esc(p.image)+'" alt="" onerror="this.style.visibility=&#39;hidden&#39;">' : '<div style="width:46px;height:46px;border-radius:8px;background:#f1f2f4;"></div>')
          + '<div class="flex-grow-1"><div class="fw-semibold">'+esc(name)+'</div>'
          + '<div class="text-muted" style="font-size:.82rem;">'+fmtMoney(price)+' × '+esc(qty)+'</div></div>'
          + '<div class="fw-bold">'+fmtMoney(price*(Number(qty)||0))+'</div>'
          + '</div>';
      });
    } else {
      prodHtml = '<div class="text-muted">No products recorded for this order.</div>';
    }

    var statusBtns = STATUSES.map(function(s){
      var active = (s.key === sm.key);
      return '<button class="btn btn-sm '+(active?'btn-brand':'btn-outline-secondary')+' status-set-btn" data-status="'+esc(s.key)+'">'+esc(s.label)+'</button>';
    }).join(' ');

    var archiveBlock = ''
      + '<hr>'
      + '<div class="d-flex justify-content-between align-items-center flex-wrap gap-2">'
      +   '<span class="text-muted" style="font-size:.82rem;">'
      +     (arch ? 'This order is archived — hidden from the list, but its data is kept.' : 'Archiving hides the order from the list without deleting its data.')
      +   '</span>'
      +   '<button class="btn btn-sm '+(arch?'btn-outline-success':'btn-outline-danger')+'" id="archiveBtn">'
      +     (arch ? '<i class="bi bi-arrow-counterclockwise"></i> Unarchive' : '<i class="bi bi-archive"></i> Archive order')
      +   '</button>'
      + '</div>'
      + '<div id="archiveMsg" class="mt-2" style="font-size:.85rem;"></div>';

    var body = ''
      + '<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">'
      +   '<span class="order-id">#'+esc(id)+(arch?' <span class="arch-tag">Archived</span>':'')+'</span>'
      +   '<span class="badge-status '+sm.css+'" id="modalCurrentStatus" style="background:'+sm.color+';color:#fff;">'+esc(sm.label)+'</span>'
      + '</div>'
      + '<h6 class="fw-bold mb-2"><i class="bi bi-person"></i> Customer details</h6>'
      + '<div class="mb-3">'
      +   '<div class="info-row"><span class="k">Name</span><span class="v">'+esc(customerName(d))+'</span></div>'
      +   '<div class="info-row"><span class="k">Phone</span><span class="v" dir="ltr">'+esc(d.phone||sh.phone||"—")+'</span></div>'
      +   ((d.email||sh.email) ? '<div class="info-row"><span class="k">Email</span><span class="v" dir="ltr">'+esc(d.email||sh.email)+'</span></div>' : '')
      +   '<div class="info-row"><span class="k">Address</span><span class="v">'+esc(sh.address1||d.address||"—")+'</span></div>'
      +   '<div class="info-row"><span class="k">City</span><span class="v">'+esc(sh.city||d.city||"—")+'</span></div>'
      +   '<div class="info-row"><span class="k">State</span><span class="v">'+esc(sh.stateName||sh.state||d.state||d.wilaya||"—")+'</span></div>'
      +   '<div class="info-row"><span class="k">ZIP</span><span class="v" dir="ltr">'+esc(sh.zip||d.zip||"—")+'</span></div>'
      +   '<div class="info-row"><span class="k">Date</span><span class="v">'+esc(fmtDate(orderDate(d)))+'</span></div>'
      + '</div>'
      + '<h6 class="fw-bold mb-2"><i class="bi bi-bag"></i> Products</h6>'
      + '<div class="mb-2">'+prodHtml+'</div>'
      + '<div class="info-row" style="font-size:1.05rem;"><span class="k fw-bold">Total</span><span class="v">'+fmtMoney(orderTotal(d))+'</span></div>'
      + '<hr>'
      + '<h6 class="fw-bold mb-2"><i class="bi bi-arrow-repeat"></i> Update status</h6>'
      + '<div class="d-flex flex-wrap gap-2" id="statusBtns">'+statusBtns+'</div>'
      + '<div id="statusMsg" class="mt-2" style="font-size:.85rem;"></div>'
      + archiveBlock;

    $("modalBody").innerHTML = body;

    var btns = $("statusBtns").querySelectorAll('.status-set-btn');
    for (var i=0;i<btns.length;i++){
      btns[i].addEventListener('click', function(){
        updateStatus(id, this.getAttribute('data-status'));
      });
    }
    var aBtn = $("archiveBtn");
    if (aBtn){ aBtn.addEventListener('click', function(){ toggleArchive(id, !isArchived(d)); }); }

    if (!modalInstance) modalInstance = new bootstrap.Modal($("orderModal"));
    modalInstance.show();
  }

  /* ===== Update status in Firestore (only the status field) ===== */
  function updateStatus(id, newStatus){
    var msg = $("statusMsg");
    msg.innerHTML = '<span class="text-muted"><span class="spinner-border spinner-border-sm"></span> Saving…</span>';
    var btns = $("statusBtns").querySelectorAll('.status-set-btn');
    for (var i=0;i<btns.length;i++) btns[i].disabled = true;

    db.collection('orders').doc(id).update({ status: newStatus })
      .then(function(){
        for (var i=0;i<allOrders.length;i++){ if (allOrders[i].id === id){ allOrders[i].data.status = newStatus; break; } }
        var sm = statusMeta(newStatus);
        var cur = $("modalCurrentStatus");
        if (cur){ cur.className = 'badge-status ' + sm.css; cur.style.background = sm.color; cur.style.color = '#fff'; cur.textContent = sm.label; }
        for (var j=0;j<btns.length;j++){
          var bs = btns[j].getAttribute('data-status');
          btns[j].className = 'btn btn-sm ' + (bs === newStatus ? 'btn-brand' : 'btn-outline-secondary') + ' status-set-btn';
          btns[j].disabled = false;
        }
        msg.innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> Status updated</span>';
        renderStats();
        renderCharts();
        applyFilters();
      })
      .catch(function(err){
        console.error('Update error', err);
        for (var k=0;k<btns.length;k++) btns[k].disabled = false;
        var t = (err && err.code === 'permission-denied')
          ? "You don't have permission for this action. Check that your Firestore rules are published and you're signed in."
          : "Something went wrong. Please try again.";
        msg.innerHTML = '<span class="text-danger"><i class="bi bi-exclamation-circle"></i> '+esc(t)+'</span>';
      });
  }

  /* ===== Archive / unarchive (soft-delete via the archived field) ===== */
  function toggleArchive(id, makeArchived){
    var msg = $("archiveMsg");
    if (msg) msg.innerHTML = '<span class="text-muted"><span class="spinner-border spinner-border-sm"></span> Saving…</span>';
    var aBtn = $("archiveBtn"); if (aBtn) aBtn.disabled = true;

    db.collection('orders').doc(id).update({ archived: makeArchived })
      .then(function(){
        for (var i=0;i<allOrders.length;i++){ if (allOrders[i].id === id){ allOrders[i].data.archived = makeArchived; break; } }
        renderStats();
        renderCharts();
        applyFilters();
        openOrder(id); // refresh modal so the button + tags reflect the new state
        var m2 = $("archiveMsg");
        if (m2) m2.innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> '+(makeArchived?'Archived':'Unarchived')+'</span>';
      })
      .catch(function(err){
        console.error('Archive error', err);
        if (aBtn) aBtn.disabled = false;
        var t = (err && err.code === 'permission-denied')
          ? "You don't have permission for this action. Check that your Firestore rules are published and you're signed in."
          : "Something went wrong. Please try again.";
        var m3 = $("archiveMsg");
        if (m3) m3.innerHTML = '<span class="text-danger"><i class="bi bi-exclamation-circle"></i> '+esc(t)+'</span>';
      });
  }

  /* ===== Wire up events ===== */
  document.addEventListener('DOMContentLoaded', function(){
    initFirebase();
    if (auth){ auth.onAuthStateChanged(onAuth); }

    $("loginBtn").addEventListener('click', tryLogin);
    $("adminPass").addEventListener('keydown', function(e){ if (e.key === 'Enter') tryLogin(); });
    $("adminEmail").addEventListener('keydown', function(e){ if (e.key === 'Enter') $("adminPass").focus(); });
    $("logoutBtn").addEventListener('click', logout);
    $("refreshBtn").addEventListener('click', loadOrders);
    $("searchInput").addEventListener('input', applyFilters);
    $("statusFilter").addEventListener('change', applyFilters);
    $("dateFrom").addEventListener('change', applyFilters);
    $("dateTo").addEventListener('change', applyFilters);
    $("showArchived").addEventListener('change', applyFilters);
    $("clearFilters").addEventListener('click', function(){
      $("searchInput").value = ''; $("statusFilter").value = '';
      $("dateFrom").value = ''; $("dateTo").value = '';
      applyFilters();
    });
  });

})();
</script>
</body>
</html>
